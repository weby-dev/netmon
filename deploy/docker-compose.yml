# Optional: run ClickHouse (storage) in a container on the Proxmox host.
# The collector itself must run on the host (XDP needs host kernel/NIC access),
# NOT in a container. The real-time stream is served by the collector directly
# on port 8090 (SSE /live) — there is no web container.
#
#   cd deploy && docker compose up -d
#
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: netmon-clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    ports:
      - "127.0.0.1:8123:8123"   # HTTP (collector writes here; query history here)
      - "127.0.0.1:9000:9000"   # native protocol
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ch_data:
  ch_logs:
