# Optional: run ClickHouse + the web stream in containers on the Proxmox host.
# The collector itself must run on the host (XDP needs host kernel/NIC access),
# NOT in a container.
#
#   cd deploy && docker compose up -d
#
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: netmon-clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    ports:
      - "127.0.0.1:8123:8123"   # HTTP (collector + web talk to this)
      - "127.0.0.1:9000:9000"   # native
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    container_name: netmon-web
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "netmon"
    ports:
      - "0.0.0.0:8088:8088"
    restart: unless-stopped

volumes:
  ch_data:
  ch_logs:
